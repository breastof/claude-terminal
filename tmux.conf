# Claude Terminal — tmux configuration
# Used with: tmux -L claude-terminal -f tmux.conf
#
# Sections:
#   1. Behavior         — prefix, escape-time, history (interactive UX)
#   2. Compat           — terminal capabilities (xterm.js / RGB / sync / clipboard / focus)
#   3. Streaming reliability — focus-events, monitor-bell, set-clipboard,
#                              automatic-rename, status, mouse, allow-rename, remain-on-exit
#   4. Geometry         — window-size manual + default-size 200x50 (kills resize storms; load-bearing for P5)
#
# See agent-workflow/06-integration-plan-tmux.md §4.3 (WP-B) for rationale.

# --- Section 1: Behavior ------------------------------------------------------

# Prefix: C-] (rarely used, won't conflict with Claude CLI)
set -g prefix C-]
unbind C-b

# Instant escape key passthrough (no delay)
set -g escape-time 0

# Modest scrollback. 50000 lines was a disaster: Claude Code's TUI does
# full-screen redraws in the NORMAL screen buffer (no \x1b[?1049h alt-screen
# toggle), so each redraw pushes the previous frame into tmux's scrollback
# as a fossil. At 50000 × narrow mobile width that produces a swamp of
# overlapping snapshots that show up in every reconnect-snapshot ("kal из
# надоженных друг на друга"). 2000 lines = enough for the user to scroll
# back through a couple of recent turns, capped against unbounded fossil
# growth.
set -g history-limit 2000

# --- Section 2: Compat (terminal capabilities) -------------------------------

# Terminal capability — enable atomic redraws, focus events, RGB.
# tmux-256color is the recommended terminfo entry inside tmux (advertises
# sync, clipboard, focus). The OUTER PTY env (terminal-manager.js) keeps
# TERM=xterm-256color for xterm.js consumption.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*256col*:RGB,clipboard,focus,sync"

# --- Section 3: Streaming reliability ----------------------------------------

# No status bar (invisible to xterm.js)
set -g status off

# Mouse OFF — xterm.js handles selection/scroll natively.
# tmux mouse intercepts events and creates its own yellow selection
# that conflicts with browser copy (Cmd+C / Ctrl+C).
set -g mouse off

# Don't rename windows
set -g allow-rename off

# Destroy session when the command inside exits
set -g remain-on-exit off

# Reliability hardening — surface editor focus/blur, suppress bells/auto-rename,
# disable OSC 52 clipboard write (security; xterm.js handles copy locally).
set -g focus-events on
setw -g automatic-rename off
setw -g monitor-bell off
set -g set-clipboard off

# --- Section 4: Geometry -----------------------------------------------------

# DO NOT set `window-size manual` here — it crashes the tmux server when
# new-session is launched with explicit `-x -y` (terminal-manager.js does
# this). Symptom: `tmux: server exited unexpectedly` on resume/create.
# We rely on the default `window-size latest` + browser-side resize
# coalescing in terminal-manager.js. Resize storms are mitigated client-
# side via FitAddon debounce in Terminal.tsx.
setw -g aggressive-resize off
